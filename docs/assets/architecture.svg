<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" role="img" aria-label="Assay scan architecture: MCP mode and legacy mode both produce audit.json and audit.md">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1 L8 5 L0 9 Z" fill="#9AA0B4"/>
    </marker>
    <style>
      .lane{font:600 15px system-ui,'Segoe UI',sans-serif;letter-spacing:.3px}
      .box{fill:#fff;stroke:#E2E3EC}
      .boxa{fill:#F6F5FE;stroke:#D9D6F5}
      .t{font:500 14px system-ui,'Segoe UI',sans-serif;fill:#2C2F3A}
      .mono{font:13px ui-monospace,Menlo,monospace;fill:#4A3ED4}
      .cap{font:12px system-ui,sans-serif;fill:#7A8090}
      .edge{stroke:#9AA0B4;stroke-width:2;fill:none}
      .final{fill:#EEF9F2;stroke:#BBE6CC}
    </style>
  </defs>
  <rect x="0.5" y="0.5" width="999" height="599" rx="18" fill="#FCFCFE" stroke="#EDEEF4"/>

  <text class="lane" x="250" y="40" text-anchor="middle" fill="#4A3ED4">&#9670; MCP mode &#8212; default</text>
  <text class="lane" x="750" y="40" text-anchor="middle" fill="#6A7080">Legacy in-process &#8212; <tspan class="mono">--scan-mode legacy</tspan></text>

  <g text-anchor="middle">
    <rect class="boxa" x="60" y="58"  width="380" height="52" rx="12"/><text class="t" x="250" y="89"><tspan class="mono">/assay-scan</tspan>  &#183;  Web UI &#8220;New Scan&#8221;</text>
    <rect class="box"  x="60" y="150" width="380" height="52" rx="12"/><text class="t" x="250" y="181"><tspan class="mono">assay serve</tspan> spawns <tspan class="mono">claude -p</tspan></text>
    <rect class="box"  x="60" y="242" width="380" height="52" rx="12"/><text class="t" x="250" y="266">Claude Code walks the methodology,</text><text class="t" x="250" y="285">calling <tspan class="mono">assay_*</tspan> tools</text>
    <rect class="box"  x="60" y="334" width="380" height="52" rx="12"/><text class="t" x="250" y="365"><tspan class="mono">events.jsonl + findings.jsonl</tspan></text>

    <rect class="box" x="560" y="58"  width="380" height="52" rx="12"/><text class="t" x="750" y="89">Web UI &#8220;New Scan&#8221;</text>
    <rect class="box" x="560" y="150" width="380" height="52" rx="12"/><text class="t" x="750" y="174"><tspan class="mono">scanner.Scan()</tspan> &#183; Anthropic SDK</text><text class="cap" x="750" y="192">+ 429 retry / backoff</text>
    <rect class="box" x="560" y="242" width="380" height="52" rx="12"/><text class="t" x="750" y="273">5 stages in-process: pre-pass &#8594; synthesis</text>
    <rect class="box" x="560" y="334" width="380" height="52" rx="12"/><text class="t" x="750" y="365"><tspan class="mono">findings</tspan></text>
  </g>

  <path class="edge" d="M250 110 V150" marker-end="url(#ah)"/>
  <path class="edge" d="M250 202 V242" marker-end="url(#ah)"/>
  <path class="edge" d="M250 294 V334" marker-end="url(#ah)"/>
  <path class="edge" d="M750 110 V150" marker-end="url(#ah)"/>
  <path class="edge" d="M750 202 V242" marker-end="url(#ah)"/>
  <path class="edge" d="M750 294 V334" marker-end="url(#ah)"/>

  <rect class="boxa" x="200" y="430" width="600" height="56" rx="12"/>
  <text class="t" x="500" y="455" text-anchor="middle"><tspan class="mono">verdict.Validate</tspan> &#8212; re-reads every cited <tspan class="mono">file:line</tspan>,</text>
  <text class="t" x="500" y="474" text-anchor="middle">dropping any evidence the model can&#8217;t back with real code</text>
  <path class="edge" d="M250 386 V408 H500 V430" marker-end="url(#ah)"/>
  <path class="edge" d="M750 386 V408 H500"/>

  <rect class="final" x="300" y="520" width="400" height="54" rx="12"/>
  <text class="t" x="500" y="544" text-anchor="middle" font-weight="700"><tspan class="mono">audit.json</tspan> + <tspan class="mono">audit.md</tspan></text>
  <text class="cap" x="500" y="562" text-anchor="middle">identical on-disk format &#8212; both modes</text>
  <path class="edge" d="M500 486 V520" marker-end="url(#ah)"/>
</svg>
