name: "Assay Scan"
description: "Scan a Claude Code plugin / MCP server / skill and post a verdict + SARIF."
inputs:
  target:
    description: "Path to scan."
    default: "."
  fail-on:
    description: "Fail the check when the verdict meets this threshold: unsafe | caution | any | off."
    default: "unsafe"
  comment:
    description: "Post/update a PR comment with the verdict card."
    default: "true"
  sarif:
    description: "Upload SARIF to GitHub code-scanning."
    default: "true"
  offline:
    description: "Skip OSV CVE lookups."
    default: "false"
  anthropic-api-key:
    description: "Optional. When set, runs the full LLM scan (legacy mode) instead of the deterministic --no-llm tier."
    default: ""
outputs:
  verdict:
    description: "safe | caution | unsafe"
    value: ${{ steps.scan.outputs.verdict }}
  report-path:
    description: "Path to the scan directory containing audit.json / audit.md / card.md."
    value: ${{ steps.scan.outputs.report-path }}
runs:
  using: "composite"
  steps:
    - name: Acquire assay
      shell: bash
      run: |
        if command -v assay >/dev/null 2>&1; then
          echo "using assay on PATH: $(command -v assay)"
        else
          echo "::error::assay not found on PATH. Pin/download of the release binary lands with the packaging spec; for now add a build step or install assay before this action."
          exit 1
        fi
    - name: Scan
      id: scan
      shell: bash
      env:
        # Inputs are passed via env (not interpolated into the script body) to
        # prevent GitHub Actions shell-injection: a caller that wires untrusted
        # data (e.g. a PR title) into an input must never be able to execute it.
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        TARGET: ${{ inputs.target }}
        FAIL_ON: ${{ inputs.fail-on }}
        OFFLINE: ${{ inputs.offline }}
      run: |
        set +e
        OUT="${RUNNER_TEMP:-/tmp}/assay"
        ARGS=(--format sarif --output "$OUT" --fail-on "$FAIL_ON")
        [ "$OFFLINE" = "true" ] && ARGS+=(--offline)
        if [ -z "${ANTHROPIC_API_KEY}" ]; then
          ARGS+=(--no-llm)
          echo "tier=deterministic (no ANTHROPIC_API_KEY; add one for full LLM threat-modeling)"
        else
          echo "tier=llm (legacy API mode)"
        fi
        assay scan "$TARGET" "${ARGS[@]}"
        code=$?
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"
        echo "report-path=$OUT" >> "$GITHUB_OUTPUT"
        if [ -f "$OUT/audit.json" ]; then
          v=$(grep -m1 '"verdict"' "$OUT/audit.json" | sed -E 's/.*"verdict": *"([a-z]+)".*/\1/')
          echo "verdict=${v:-unknown}" >> "$GITHUB_OUTPUT"
        fi
        # Distinguish crash (1) from gate-tripped (2): a crash must fail NOW,
        # before we try to post a (nonexistent) verdict.
        if [ "$code" != "0" ] && [ "$code" != "2" ]; then
          echo "::error::assay crashed (exit $code) — scan did not complete"
          exit "$code"
        fi
        exit 0
    - name: Post verdict comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = `${process.env.RUNNER_TEMP || '/tmp'}/assay/card.md`;
          if (!fs.existsSync(path)) { core.warning('no card.md; skipping comment'); return; }
          const marker = '<!-- assay-verdict -->';
          const body = marker + '\n' + fs.readFileSync(path, 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
          const existing = comments.data.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
    - name: Upload SARIF
      if: ${{ inputs.sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.report-path }}/audit.sarif
    - name: Gate
      shell: bash
      env:
        EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
        VERDICT: ${{ steps.scan.outputs.verdict }}
        FAIL_ON: ${{ inputs.fail-on }}
      run: |
        if [ "$EXIT_CODE" = "2" ]; then
          echo "::error::Assay verdict '$VERDICT' tripped --fail-on=$FAIL_ON"
          exit 2
        fi
